name: nutritious_mind
description: "NutriMind — AI-powered personal food intelligence app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # AI & Networking
  dio: ^5.4.0
  flutter_dotenv: ^5.1.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State Management
  get: ^4.6.6

  # Voice
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2
  permission_handler: ^11.3.0

  # Charts & Animations
  fl_chart: ^0.66.2
  flutter_animate: ^4.5.0

  # Navigation
  go_router: ^13.2.0

  # UI Utilities
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/animations/
